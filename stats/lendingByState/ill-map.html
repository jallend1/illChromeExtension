<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILL Lending Map — KCLS</title>

    <!-- Third-party libraries (local copies required by Chrome extension CSP) -->
    <script src="lib/maplibre-gl.js"></script>
    <link href="lib/maplibre-gl.css" rel="stylesheet" />
    <script src="lib/deck.gl.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="ill-map.css" />
  </head>
  <body>
    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div id="header">
      <div>
        <h1>ILL Heatmap</h1>
        <div class="sub" id="sub-label">King County Library System · 2025</div>
      </div>
      <div id="header-right">
        <div class="stat-pill">
          <span class="val" id="stat-packages">—</span>
          <span class="lbl">Packages Sent</span>
        </div>
        <div class="divider"></div>
        <div class="stat-pill">
          <span class="val" id="stat-destinations">—</span>
          <span class="lbl">Destinations</span>
        </div>
        <div class="divider"></div>
        <div class="stat-pill">
          <span class="val" id="stat-top">—</span>
          <span class="lbl">Top Destination</span>
        </div>
        <div class="divider"></div>
        <a class="nav-link" href="../shippingArcs/shipping-arcs.html"
          >Shipping Arcs ›</a
        >
      </div>
    </div>

    <!-- ── Period selector ────────────────────────────────────────────────── -->
    <div id="period-panel">
      <button class="period-btn all-btn active" data-period="all">
        All 2025
      </button>
      <button class="period-btn" data-period="2025-01">Jan</button>
      <button class="period-btn" data-period="2025-02">Feb</button>
      <button class="period-btn" data-period="2025-03">Mar</button>
      <button class="period-btn" data-period="2025-04">Apr</button>
      <button class="period-btn" data-period="2025-05">May</button>
      <button class="period-btn" data-period="2025-06">Jun</button>
      <button class="period-btn" data-period="2025-07">Jul</button>
      <button class="period-btn" data-period="2025-08">Aug</button>
      <button class="period-btn" data-period="2025-09">Sep</button>
      <button class="period-btn" data-period="2025-10">Oct</button>
      <button class="period-btn" data-period="2025-11">Nov</button>
      <button class="period-btn" data-period="2025-12">Dec</button>
    </div>

    <!-- ── Map canvas ─────────────────────────────────────────────────────── -->
    <div id="map"></div>

    <!-- ── Hover tooltip ──────────────────────────────────────────────────── -->
    <div id="tooltip">
      <div class="tt-title" id="tt-company"></div>
      <div class="tt-sub" id="tt-name"></div>
      <div class="tt-row">
        <span class="tt-key">Packages</span>
        <span class="tt-val" id="tt-packages"></span>
      </div>
      <div class="tt-row">
        <span class="tt-key">Address</span>
        <span class="tt-val" id="tt-address"></span>
      </div>
    </div>

    <!-- ── Camera hint ────────────────────────────────────────────────────── -->
    <div id="hint">
      Scroll · zoom<br />
      Drag · pan
    </div>

    <!-- ── Controls ───────────────────────────────────────────────────────── -->
    <div id="controls">
      <div class="panel">
        <div class="panel-label">Intensity</div>
        <div class="slider-row">
          <input
            type="range"
            id="intensity"
            min="0.5"
            max="10"
            step="0.5"
            value="3"
          />
          <span class="slider-val" id="intensity-val">3.0</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-label">Radius (px)</div>
        <div class="slider-row">
          <input
            type="range"
            id="radius"
            min="10"
            max="200"
            step="5"
            value="40"
          />
          <span class="slider-val" id="radius-val">40</span>
        </div>
      </div>
    </div>

    <!-- ── Legend ─────────────────────────────────────────────────────────── -->
    <div id="legend">
      <div class="legend-title">Packages Sent</div>
      <div class="legend-rows">
        <div class="legend-row">
          <div class="swatch swatch-hi"></div>
          <span>High volume</span>
        </div>
        <div class="legend-row">
          <div class="swatch swatch-mid"></div>
          <span>Mid volume</span>
        </div>
        <div class="legend-row">
          <div class="swatch swatch-lo"></div>
          <span>Low volume</span>
        </div>
      </div>
    </div>

    <!-- ── Loading overlay ────────────────────────────────────────────────── -->
    <div id="loading">
      <div class="loading-inner">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading shipment data…</div>
      </div>
    </div>

    <!-- App script -->
    <script src="ill-map.js"></script>
  </body>
</html>
